onboarding = false

[update]
channel = "preview"

[terminal]
# Use PowerShell 7 (pwsh) for new panes, not legacy Windows PowerShell 5.1.
# Stable app-execution-alias path (survives pwsh version updates).
default_shell = 'C:\Users\nvere\AppData\Local\Microsoft\WindowsApps\pwsh.exe'

[theme]
name = "tokyo-night"

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "all"

[session]
# Re-open supported AI-agent panes into their native conversations after a
# herdr server restart (e.g. reboot).
resume_agents_on_restore = true

[experimental]
# Persist recent pane scrollback (visible text, not the running process) across
# full server restarts.
pane_history = true

# Toggle lazygit (right, full-height) + yazi (under the main area) side panels.
# Windows port of herdr-panel-toggle.sh. herdr runs keybound commands through
# cmd.exe /d /c on Windows; pwsh and the script are given by absolute path so a
# minimal PATH does not matter. Accepts `both` (default) / `lazygit` / `yazi`.
[[keys.command]]
key = "prefix+y"
type = "shell"
command = 'C:\Users\nvere\AppData\Local\Microsoft\WindowsApps\pwsh.exe -NoProfile -ExecutionPolicy Bypass -File C:\Users\nvere\AppData\Roaming\herdr\scripts\herdr-panel-toggle.ps1 both'

