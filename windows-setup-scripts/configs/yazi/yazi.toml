# yazi configuration — sysadmin doc-browsing workflow (Windows port).
#
# Goal: browse the tree, read markdown rendered in the preview pane, and hand
# off to a full read / spot-edit / GUI render with a single opener choice.
#
# Windows note: the Linux config wraps openers in herdr-zoom-run.sh so the
# herdr pane zooms during a blocking read/edit. That wrapper is bash-only; the
# openers below run the same tools directly. Pane-zoom nicety is not ported.

[mgr]
show_hidden    = false
sort_by        = "natural"
sort_dir_first = true
linemode       = "size"

# --- Markdown gets rendered (not raw) in the preview pane, via the glow plugin.
[plugin]
prepend_previewers = [
  { url = "*.md",       run = "glow" },
  { url = "*.markdown", run = "glow" },
]

# --- Named openers. `run` uses yazi's placeholders: `%s` = paths of all selected
# files (the hovered file when nothing is multi-selected), auto-quoted by yazi.
# Shell tokens like `$@` / `%*` are NOT yazi placeholders (they reach the tool as
# a literal string — "bad arguments"). See the mpv example in the yazi docs:
# `"C:\Program Files\mpv.exe" %s` — the exe is quoted, `%s` is not.
[opener]
read = [
  # Full-screen rendered read inside the terminal (blocks until you quit).
  # `-t` (self-contained TUI), NOT `-p` (pager): glow 2.x's pager shells out to
  # `less`, which isn't on the Windows PATH, so `-p` fails with "less not found".
  { run = 'glow -t %s', block = true, desc = "Read (glow TUI)", for = "windows" },
]
edit = [
  { run = 'nvim %s', block = true, desc = "Edit (nvim)", for = "windows" },
]
md-gui = [
  # Detached GUI markdown viewer with full fidelity (mermaid, images).
  { run = '"C:\Users\nvere\AppData\Local\Programs\Zettlr\Zettlr.exe" %s', orphan = true, desc = "Open in Zettlr", for = "windows" },
]
reveal = [
  { run = 'explorer /select,%s', orphan = true, desc = "Reveal in Explorer", for = "windows" },
]

# --- For *.md, Enter/o opens the first opener (glow read); O shows the menu.
[open]
prepend_rules = [
  { url = "*.md",       use = [ "read", "edit", "md-gui", "reveal" ] },
  { url = "*.markdown", use = [ "read", "edit", "md-gui", "reveal" ] },
]
