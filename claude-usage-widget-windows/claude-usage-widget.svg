<?xml version="1.0" encoding="UTF-8"?>
<!-- App/bundle icon source for the Claude Usage Widget.

     A usage-gauge ring on a rounded dark tile, echoing the dynamically
     generated tray icon (src/tray.py): an outer ring plus a clockwise arc
     showing utilization. Rasterized to .icns by scripts/create_icns.py. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f36"/>
      <stop offset="1" stop-color="#1b1e24"/>
    </linearGradient>
  </defs>

  <!-- Rounded background tile -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Track ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#3a3f48" stroke-width="40"/>

  <!-- Utilization arc (~62%, clockwise from top), brand green.
       Path: start at top, sweep clockwise to ~223 degrees. -->
  <path d="M 256 106
           A 150 150 0 1 1 153.7 365.6"
        fill="none" stroke="#4caf50" stroke-width="40" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="46" fill="#4caf50"/>
</svg>
